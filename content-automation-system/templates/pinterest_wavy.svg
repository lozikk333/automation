<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1500" width="1000" height="1500">

  <!-- Sky background -->
  <rect width="1000" height="1500" fill="#d6eef8"/>

  <!-- Cloud top-center -->
  <ellipse cx="430" cy="170" rx="100" ry="70" fill="white" opacity="0.95"/>
  <ellipse cx="510" cy="150" rx="90" ry="65" fill="white" opacity="0.95"/>
  <ellipse cx="570" cy="170" rx="80" ry="60" fill="white" opacity="0.95"/>
  <ellipse cx="480" cy="200" rx="130" ry="55" fill="white" opacity="0.95"/>

  <!-- Cloud bottom-center -->
  <ellipse cx="430" cy="1310" rx="90" ry="60" fill="white" opacity="0.80"/>
  <ellipse cx="510" cy="1295" rx="80" ry="55" fill="white" opacity="0.80"/>
  <ellipse cx="570" cy="1310" rx="70" ry="50" fill="white" opacity="0.80"/>

  <!-- Green hills — upper band -->
  <path d="M0,420 Q150,320 300,380 Q450,440 600,350 Q750,260 1000,360 L1000,560 L0,560 Z" fill="#7ab648"/>
  <path d="M0,480 Q200,400 400,450 Q600,500 800,430 Q900,400 1000,420 L1000,580 L0,580 Z" fill="#5a9e30" opacity="0.6"/>

  <!-- Green hills — lower band -->
  <path d="M0,1100 Q200,1020 400,1080 Q600,1140 800,1060 Q900,1030 1000,1060 L1000,1500 L0,1500 Z" fill="#7ab648"/>
  <path d="M0,1150 Q150,1080 350,1130 Q550,1180 750,1110 Q880,1070 1000,1100 L1000,1500 L0,1500 Z" fill="#5a9e30" opacity="0.6"/>

  <!-- White title card with pink border -->
  <rect x="60" y="610" width="880" height="370" rx="8" ry="8" fill="#ff69b4" />
  <rect x="68" y="618" width="864" height="354" rx="6" ry="6" fill="white" />

  <!-- TITLE placeholder text (replaced at render time) -->
  <text x="500" y="810" text-anchor="middle" font-family="Arial Black, sans-serif"
        font-size="80" font-weight="900" fill="#ff69b4" letter-spacing="4">TITLE</text>

</svg>
